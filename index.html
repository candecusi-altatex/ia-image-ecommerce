<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Ecommerce - Procesamiento Masivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-comparacion {
            display: inline-flex;
            gap: 1rem;
            padding: 1.5rem;
            border-bottom: 2px solid #eee;
        }
        .img-preview {
            width: 100%;
            height: 220px;
            object-fit: contain;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .contenedorResultados{
            text-align: center;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto bg-white p-6 rounded-2xl shadow-xl">
        <header class="mb-8 border-b pb-6">
            <h1 class="text-3xl font-bold text-gray-800">Editor Masivo IA #F2F2F2</h1>
            <p class="text-gray-500">Selecciona múltiples archivos y la IA los procesará uno por uno.</p>
        </header>

        <div class="flex flex-col items-center justify-center border-3 border-dashed border-blue-200 rounded-xl p-10 bg-blue-50 hover:bg-blue-100 transition-all mb-8">
            <input type="file" id="fotoInput" accept="image/*" multiple class="hidden">
            <label for="fotoInput" class="cursor-pointer bg-blue-600 text-white px-8 py-4 rounded-lg font-bold shadow-lg hover:scale-105 transition-transform">
                Subir Fotos (Selección Múltiple)
            </label>
            <p id="contador" class="mt-4 text-blue-800 font-medium"></p>
        </div>

        <div id="contenedorResultados" class="space-y-4">
            </div>
    </div>

    <script>
        // TU URL DE HUGGING FACE
        const API_URL = "https://cleta-epineurial-noninertly.ngrok-free.dev/procesar";

        const input = document.getElementById('fotoInput');
        const contenedor = document.getElementById('contenedorResultados');
        const contadorTexto = document.getElementById('contador');

        input.onchange = async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            contadorTexto.innerText = `Preparadas ${files.length} imágenes...`;
            
            // Procesamos una por una
            for (const file of files) {
                await procesarImagen(file);
            }
            
            contadorTexto.innerText = "¡Procesamiento finalizado!";
        };

        async function procesarImagen(file) {
            // 1. Crear la fila en la interfaz
            const row = document.createElement('div');
            row.className = 'grid-comparacion';
            
            // Generar URL temporal para la original
            const originalUrl = URL.createObjectURL(file);

            row.innerHTML = `
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase mb-2">Original: ${file.name}</p>
                    <img src="${originalUrl}" class="img-preview">
                </div>
                <div>
                    <p class="text-xs font-bold text-blue-500 uppercase mb-2 text-center">Resultado IA (#F2F2F2)</p>
                    <div class="loader text-center p-20 font-bold text-blue-400">Procesando...</div>
                    <img class="img-preview hidden res-img">
                    <div class="text-center mt-2">
                        <a class="btn-download hidden bg-gray-800 text-white px-4 py-2 rounded text-sm hover:bg-black cursor-pointer">Descargar JPEG</a>
                    </div>
                </div>
            `;
            
            contenedor.prepend(row); // Las nuevas aparecen arriba

            const resImg = row.querySelector('.res-img');
            const loader = row.querySelector('.loader');
            const btnDownload = row.querySelector('.btn-download');

            // 2. Enviar a la API
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if(data.image_base64) {
                    const base64Final = "data:image/jpeg;base64," + data.image_base64;
                    resImg.src = base64Final;
                    
                    // Configurar botón descarga
                    btnDownload.href = base64Final;
                    btnDownload.download = `procesada_${file.name.split('.')[0]}.jpg`;
                    
                    // Mostrar resultado
                    loader.classList.add('hidden');
                    resImg.classList.remove('hidden');
                    btnDownload.classList.remove('hidden');
                }
            } catch (err) {
                loader.innerText = "Error al procesar esta imagen";
                loader.classList.add('text-red-500');
            }
        }
    </script>
</body>
</html>
